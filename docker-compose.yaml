services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: AuthService
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  auth-service:
    build: .
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64}
      HMAC_SECRET_BASE64: ${HMAC_SECRET_BASE64}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    networks:
      - internal
      - shared-network

volumes:
  mysql_data:
  redis_data:

networks:
  shared-network:
    name: services-network
    driver: bridge
  internal:
    internal: true